<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULLIED INDUSTRIES // COMMISSARY</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        #merchGrid { display: flex; flex-direction: column; gap: 25px; width: 95%; max-width: 1200px; margin: 40px auto; }
        .merch-entry { display: grid; grid-template-columns: 300px 1fr 250px; gap: 40px; background: rgba(10, 12, 11, 0.6); border: 1px solid #2d3b2d; padding: 30px; align-items: center; }
        .merch-visual { width: 100%; aspect-ratio: 1/1; background: #050505; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; }
        .tag { color: var(--signal-green); border: 1px solid var(--signal-green); padding: 2px 8px; font-size: 0.6em; letter-spacing: 2px; }
        @media (max-width: 900px) { .merch-entry { grid-template-columns: 1fr; text-align: center; } }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <header style="text-align: center; margin-top: 60px;">
        <h1 style="color: var(--signal-green); letter-spacing: 8px;">COMMISSARY</h1>
        <p style="color: #888; text-transform: uppercase; font-size: 0.8em;">Logistics & Supply Chain // Deployment Pending</p>
    </header>

    <div id="merchGrid">
        <div class="merch-entry" style="opacity: 0.5; filter: grayscale(1);">
            <div class="merch-visual">IMAGE_PENDING</div>
            <div class="merch-intel">
                <span class="tag">APPAREL // 001</span>
                <h3 style="margin: 10px 0;">SULLIED CORE BEANIE</h3>
                <p style="color: #888; font-size: 0.9em;">Heavyweight knit. Optimized for long-term bunker operations.</p>
            </div>
            <div class="merch-status" style="text-align: right;">
                <div style="color: #ff3e3e; font-size: 0.7em; font-weight: bold;">[ OFFLINE ]</div>
                <div style="font-size: 1.5em; font-family: monospace;">TBA</div>
                <span class="login-btn" style="opacity: 0.5; cursor: not-allowed; display: inline-block; margin-top: 15px;">ACCESS_DENIED</span>
            </div>
        </div>
    </div>

    <script>
        fetch('nav.html').then(res => res.text()).then(data => {
            document.getElementById('nav-placeholder').innerHTML = data;
        });
    </script>
</body>
</html>
