<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sullied Industries | Intake</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="nav-placeholder"></div>

<script>
    fetch('nav.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('nav-placeholder').innerHTML = data;
        });
</script>

    <h1>SERVICE INTAKE FORM</h1>
    
    <form action="https://api.web3forms.com/submit" method="POST" class="intake-form">
        
        <input type="hidden" name="access_key" value="60bbd57d-b773-4e4b-b1da-cd1213d34896">

        <label>YOUR NAME</label>
        <input type="text" name="real_name" required placeholder="Real Name">
        
        <label>ARTIST NAME</label>
        <input type="text" name="artist_name" required placeholder="Or Group Name">

        <label>REQUESTED SERVICE</label>
        <select id="service_select" name="service" required>
            <option value="" disabled selected>SELECT_SERVICE_TYPE</option>
            <option value="ignition">The Ignition Bundle</option>
            <option value="standard">Standard Retainer</option>
            <option value="premium">Premium Retainer</option>
            <option value="project">Project Release</option>
            <option value="metadata">Update Information</option>
            <option value="visuals">Visual Processing</option>
            <option value="navigation">Links or Copyright</option>
            <option value="website">Website Architecture</option>
            <option value="toolsuggest">Suggest a New Tool</option>
            <option value="helprequest">Help</option>
        </select>

        <label>PROJECT DETAILS / LINKS</label>
        <textarea name="message" rows="5" placeholder="Request Description"></textarea>

        <label>YOUR CONTACT EMAIL</label>
        <input type="email" name="email" required placeholder="artist@email.com">

        <button type="submit" class="login-btn">TRANSMIT DATA</button>
    </form>
</script>
<script>
function toggleMenu() {
    const nav = document.getElementById('navLinks');
    nav.classList.toggle('active');
}
<script>
    // 1. Get the "service" value from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const serviceRequested = urlParams.get('service');

    // 2. If there is a service in the URL, select it in the dropdown
    if (serviceRequested) {
        const selectElement = document.getElementById('service-select');
        
        // Ensure the ID matches the 'id' of your <select> tag
        if (selectElement) {
            selectElement.value = serviceRequested;
        }
    }
</script>
<script>
    window.addEventListener('DOMContentLoaded', (event) => {
        const urlParams = new URLSearchParams(window.location.search);
        const serviceRequested = urlParams.get('service');
        const selectElement = document.getElementById('service-select');

        if (selectElement) {
            if (serviceRequested) {
                // If a service is in the URL, switch to it
                selectElement.value = serviceRequested;
            } else {
                // If NO service is in the URL (from Nav Bar), force the placeholder
                selectElement.selectedIndex = 0;
            }
        }
    });
</script>
</body>
</html>
